name: Scheduled notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-due-reminders:
    runs-on: ubuntu-latest
    env:
      RECASTR_APP_URL: ${{ secrets.RECASTR_APP_URL || 'https://recastr.vercel.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Process due scheduled notification emails
        shell: bash
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl --fail --silent --show-error \
              -X POST \
              -H "User-Agent: github-actions-cron" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$RECASTR_APP_URL/api/cron/scheduled-notifications"
          else
            curl --fail --silent --show-error \
              -X POST \
              -H "User-Agent: github-actions-cron" \
              "$RECASTR_APP_URL/api/cron/scheduled-notifications"
          fi
